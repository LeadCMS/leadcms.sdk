name: Publish to NPM

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write # Required for OIDC trusted publishing
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run build
        run: pnpm run build

      - name: Run tests
        run: pnpm test

      - name: Verify package contents
        run: |
          pnpm pack --dry-run
          echo "Package contents:"
          tar -tzf $(pnpm pack --silent) | head -20

      - name: Publish to NPM
        run: pnpm publish --access public --no-git-checks

      - name: Create package info
        run: |
          echo "## 📦 Published Package" >> $GITHUB_STEP_SUMMARY
          echo "- **Package:** $(node -p \"require('./package.json').name\")" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** $(node -p \"require('./package.json').version\")" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry:** https://www.npmjs.com/package/$(node -p \"require('./package.json').name\")" >> $GITHUB_STEP_SUMMARY
          echo "- **Install:** \`pnpm add $(node -p \"require('./package.json').name\")\`" >> $GITHUB_STEP_SUMMARY
